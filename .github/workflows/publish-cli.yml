name: Publish fp-conv-cli

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    # Only react to this package's release tags (e.g. cli-v1.0.1) so a release
    # for another package does not trigger a CLI publish. Manual
    # workflow_dispatch runs are always allowed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 24.5.0+ bundles npm >= 11.5.1, required for OIDC trusted
          # publishing. Pinned for reproducible release builds
          node-version: '24.16.0'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build --workspace fp-conv-cli

      - name: Run tests
        run: |
          npm run test:coverage
          npm test --workspace fp-conv-cli

      - name: Publish to npm
        # Authentication and provenance are handled automatically via OIDC
        # trusted publishing (see Settings > Trusted Publishing on npmjs.com).
        run: npm publish --workspace fp-conv-cli --access public
